spring.application.name=nori-stock
server.servlet.context-path=/nori-stock/v1
server.servlet.application-display-name=nori-stock
spring.datasource.url=jdbc:postgresql://localhost:5432/nori_stock
spring.datasource.username=${BD_USERNAME}
spring.datasource.password=${BD_PASSWORD}
server.port=8081
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
api.security.token.secret=${JWT_SECRET}
api.security.token.expiration=${EXPIRATION}


spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer